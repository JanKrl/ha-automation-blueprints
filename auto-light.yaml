blueprint:
  name: Auto-light 3
  description: "Motion triggered light. Enables 'dim before off' to notify that the light will turn off soon. To be used on lights controlled by Adaptive Lighting addon. IMPORTANT! Requres Adaptive Lighting config include_config_in_attributes to be enabled."
  domain: automation
  input:
    motion_sensor:
      name: Motion sensor
      description: Motion / Occupancy sensor in the area
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: motion
            - domain: binary_sensor
              device_class: occupancy
    adaptive_lights:
      name: Adaptive light
      description: Adaptive lighting integration that controlls selected lights
      selector:
        device:
          filter:
            - integration: adaptive_lighting

triggers:
  - trigger: state
    entity_id: !input motion_sensor
    from: null
    to: "on"

actions:
  - variables:
      al_device: !input adaptive_lights
      switch_entity: >
        {{ device_entities(al_device)
            | select('match', 'switch.adaptive_lighting_')
            | reject('match', 'switch.adaptive_lighting_adapt_')
            | reject('match', 'switch.adaptive_lighting_sleep_mode_')
            | first }}
      target_lights: "{{ state_attr(switch_entity, 'configuration')['lights'] }}"

  - action: adaptive_lighting.set_manual_control
    data:
      manual_control: false
      entity_id: "{{ switch_entity }}"
    enabled: true

  - action: light.turn_on
    target:
      entity_id: "{{ target_lights }}"

  - alias: Wait until there is no motion from device
    wait_for_trigger:
      - trigger: state
        entity_id: !input motion_sensor
        from: "on"
        to: "off"
        for:
          seconds: 30
    continue_on_timeout: false

  - variables:
      dimmed_brightness: "{{ (state_attr(switch_entity, 'brightness_pct') | float(100) / 3) | int }}"

  - action: light.turn_on
    data:
      brightness_pct: "{{ dimmed_brightness }}"
      transition: 1
    target:
      entity_id: "{{ target_lights }}"
    enabled: true

  - delay:
      seconds: 5
    enabled: true

  - action: light.turn_off
    target:
      entity_id: "{{ target_lights }}"

mode: restart
max_exceeded: silent
